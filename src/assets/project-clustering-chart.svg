<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Clustering Feature Importance</title>
  <desc id="desc">Bar chart that compares feature values per cluster.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>
  </defs>
  <rect width="1200" height="620" fill="url(#bg)" />

  <g stroke="#cbd5e1" stroke-width="2">
    <line x1="80" y1="530" x2="1130" y2="530" />
    <line x1="80" y1="450" x2="1130" y2="450" />
    <line x1="80" y1="370" x2="1130" y2="370" />
    <line x1="80" y1="290" x2="1130" y2="290" />
    <line x1="80" y1="210" x2="1130" y2="210" />
    <line x1="80" y1="130" x2="1130" y2="130" />
  </g>

  <g fill="#334155" font-size="22" font-family="Arial, Helvetica, sans-serif">
    <text x="40" y="536">0.0</text>
    <text x="40" y="456">0.2</text>
    <text x="40" y="376">0.4</text>
    <text x="40" y="296">0.6</text>
    <text x="40" y="216">0.8</text>
    <text x="40" y="136">1.0</text>
  </g>

  <g>
    <rect x="145" y="90" width="46" height="440" fill="#f4a582" />
    <rect x="195" y="92" width="46" height="438" fill="#92a8d1" />
    <rect x="245" y="105" width="46" height="425" fill="#d7a2c8" />

    <rect x="425" y="335" width="46" height="195" fill="#f4a582" />
    <rect x="475" y="355" width="46" height="175" fill="#92a8d1" />
    <rect x="525" y="385" width="46" height="145" fill="#d7a2c8" />

    <rect x="705" y="522" width="46" height="8" fill="#7cc3b2" />
    <rect x="755" y="485" width="46" height="45" fill="#f4a582" />
    <rect x="805" y="470" width="46" height="60" fill="#92a8d1" />
    <rect x="855" y="315" width="46" height="215" fill="#d7a2c8" />
    <rect x="905" y="330" width="46" height="200" fill="#a8cf6c" />

    <rect x="985" y="465" width="46" height="65" fill="#7cc3b2" />
    <rect x="1035" y="450" width="46" height="80" fill="#f4a582" />
    <rect x="1085" y="385" width="46" height="145" fill="#92a8d1" />
  </g>

  <g fill="#334155" font-size="24" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="220" y="575">DRtg</text>
    <text x="500" y="575">ORTg</text>
    <text x="820" y="575">TO%</text>
    <text x="1060" y="575">USG%</text>
  </g>

  <g transform="translate(985 85)" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">
    <text x="0" y="0" font-weight="700">Cluster</text>
    <rect x="0" y="18" width="18" height="18" fill="#7cc3b2" /><text x="28" y="33">0</text>
    <rect x="0" y="46" width="18" height="18" fill="#f4a582" /><text x="28" y="61">1</text>
    <rect x="0" y="74" width="18" height="18" fill="#92a8d1" /><text x="28" y="89">2</text>
    <rect x="0" y="102" width="18" height="18" fill="#d7a2c8" /><text x="28" y="117">3</text>
    <rect x="0" y="130" width="18" height="18" fill="#a8cf6c" /><text x="28" y="145">4</text>
  </g>
</svg>
